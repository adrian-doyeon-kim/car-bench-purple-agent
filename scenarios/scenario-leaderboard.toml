# Official leaderboard submission scenario — paste this (or its values) into
# your fork of https://github.com/CAR-bench/car-bench-leaderboard-agentbeats
# at the repo root as `scenario.toml`, then commit to trigger evaluation.
#
# Requirements:
#   - The green_agent.agentbeats_id must remain the official CAR-bench
#     Evaluator (do NOT change).
#   - Replace `agentbeats_id` under [[participants]] with your registered
#     purple agent's UUID from agentbeats.dev.
#   - `name = "agent"` must NOT be changed — the evaluator looks up the
#     purple participant by this role name.
#   - `env = {...}` must remain a single TOML inline table (one line).
#   - Never hardcode API keys here. Use `${VAR}` placeholders; the
#     leaderboard workflow writes GitHub Secrets into a .env file at
#     runtime and docker-compose substitutes them.
#   - For a final submission keep `num_trials = 3`, `task_split = "test"`,
#     and all three `tasks_*_num_tasks = -1` (full test split).

[green_agent]
agentbeats_id = "019bb9d5-c273-7ba0-8beb-34e2fb140c10"  # CAR-bench Evaluator (do not change)
env = { GEMINI_API_KEY = "${GEMINI_API_KEY}", LOGURU_LEVEL = "${LOGURU_LEVEL}" }

[[participants]]
agentbeats_id = "REPLACE-WITH-YOUR-PURPLE-AGENT-ID"
name = "agent"  # do not change
env = { OPENAI_API_KEY = "${OPENAI_API_KEY}", AGENT_LLM = "openai/gpt-5-mini", AGENT_THINKING = "true", AGENT_REASONING_EFFORT = "medium", AGENT_TEMPERATURE = 1.0, LOGURU_LEVEL = "${LOGURU_LEVEL}" }

[config]
num_trials = 3
task_split = "test"
tasks_base_num_tasks = -1
tasks_hallucination_num_tasks = -1
tasks_disambiguation_num_tasks = -1
max_steps = 50
